# -----------------------------------------------------------
# dark_theme.yaml
# grahams-dark theme — dark backgrounds, accent colors,
# Bubble Card styling, and per-room color variables.
# Author: Graham Stott (littlestotty-labs)
# Version: 1.0
# -----------------------------------------------------------

grahams-dark:
  card-mod-theme: "grahams-dark"
  # -----------------------------------------------------
  # Base
  # -----------------------------------------------------

  primary-font-family: "'Space Grotesk', sans-serif"
  mdc-text-field-fill-color: "#aca381ff" # background of the input
  mdc-text-field-label-ink-color: "#201f1fff" # label colour
  mdc-text-field-idle-line-color: "#585656ff" # underline/border when idle
  mdc-text-field-hover-line-color: "#666666" # underline/border when hovering
  mdc-text-field-outlined-idle-border-color: "#999999"
  mdc-text-field-outlined-hover-border-color: "#666666"
  mdc-text-field-focused-label-color: "#03a9f4" # label when focused
  mdc-text-field-focused-ink-color: "#000000" # text when focused
  mdc-text-field-ink-color: "#000000"
  mdc-text-field-placeholder-ink-color: "#242323ff"
  # Developer tools / editor fields
  codemirror-background: "#ffffff"
  codemirror-text-color: "#000000"
  code-editor-background-color: "#353533ff"
  code-editor-text-color: "#000000"
  code-editor-gutter-color: "#ffffff"

  # Background color of the input box
  input-fill-color: "#FF0000" # Example: Red background
  # Text color inside the input box
  input-ink-color: "#FFFFFF" # Example: White text
  # Color of the label text
  input-label-ink-color: "#CCCCCC" # Example: Light grey label
  # Color of the bottom border when idle
  input-idle-line-color: "#FFFFFF" # Example: White border
  # Color of the bottom border when hovered
  input-hover-line-color: "#00FF00" # Example: Green border on hover
  # For outlined input styles (if used)
  input-outlined-idle-border-color: "#FFFFFF"
  input-outlined-hover-border-color: "#00FF00"
  # -----------------------------------------------------
  # Backgrounds
  # -----------------------------------------------------
  primary-background-color: "#121416"
  secondary-background-color: "#181B1F"

  card-background-color: "#27292dff"
  ha-card-background: var(--card-background-color)
  battery_slider_background: "#2b2e34"
  ha-color-text-secondary: "#000000"
  -ha-color-fill-primary-quiet-resting: "#000000"
  # -----------------------------------------------------
  # Text
  # -----------------------------------------------------
  primary-color: "#6fa9cdff"
  primary-text-color: "#E6E9ED"

  # -----------------------------------------------------
  # Divider / Outline
  # -----------------------------------------------------
  divider-color: "rgba(255, 255, 255, 0.06)"

  # -----------------------------------------------------
  # Cards
  # -----------------------------------------------------
  ha-card-border-radius: "12px"
  ha-card-box-shadow: >
    0 8px 18px rgba(0, 0, 0, 0.85),
    inset 0 1px 0 rgba(255, 255, 255, 0.24)
  # -----------------------------------------------------
  # Accent / State
  # -----------------------------------------------------
  accent-color: "#7cb7dcff"
  state-icon-color: "#7FA6BC"
  bubble-accent-color: linear-gradient(145deg, rgba(86, 130, 155, 1) -10%, rgba(117, 160, 185, 1) 100%)
  bubble-light-opacity: 0.6

  # -----------------------------------------------------
  # Icons
  # -----------------------------------------------------
  scene-active-background: "#6a99bd" # background for large scene button
  selected-color: "#494c50ff" # used for small room buttons
  scene-selected-color: var(--card-background-color) # icon and text of large scene button

  # -----------------------------------------------------
  # Bubble Card
  # -----------------------------------------------------

  bubble-border-radius: "18px"
  popup-header-background: rgb(35,38,42,1)

  # -----------------------------------------------------
  # Room Accent Colors (Dark tuned)
  # -----------------------------------------------------
  room-lounge: "#d19c51ff"
  room-bedroom: "#3a9ff8ff"
  room-office: "#78b78fff"
  room-lights: "#ba7171ff"
  room-petrol: "#c9c687ff"
  room-garden: "#c387c9ff"
  room-tech: "#c9ab87ff"
  room-kitchen: "#5f88adff"
