# -----------------------------------------------------------
# aircon.yaml
# Device mixin — slow rotating icon animation for air
# conditioning entities when on.
# Author: Graham Stott (littlestotty-labs)
# Version: 1.0
# -----------------------------------------------------------

  aircon:
    styles:
      icon:
        - animation: |
            [[[
              if (entity.state !== 'on') return 'none';
              return `rotating 6s linear infinite`;
            ]]]
    extra_styles: |
      @keyframes rotating {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
