# -----------------------------------------------------------
# scenes.yaml
# Scene bar — grid row of decluttering-card scene buttons
# (Movie, Wii, Chat, Music, Chill, seasonal Xmas).
# Author: Graham Stott (littlestotty-labs)
# Version: 1.0
# -----------------------------------------------------------

type: custom:layout-card
layout_type: custom:grid-layout
layout:
  xmas-grid-template-columns: 17% 17% 17% 17% 17% 17%
  grid-template-columns: 20.8% 20.8% 20.8% 20.8% 20.8%
cards:
  - type: custom:decluttering-card
    template: scene_button
    variables:
      - name: Movie
      - icon: mdi:movie-open-check
      - entity: input_boolean.movie_switch
      - lmargin: '-5px'
  - type: custom:decluttering-card
    template: scene_button
    variables:
      - name: Wii
      - icon: mdi:nintendo-wii
      - entity: input_boolean.wii_switch
      - lmargin: '-5px'
  - type: custom:decluttering-card
    template: scene_button
    variables:
      - name: Chat
      - icon: mdi:whatsapp
      - entity: input_boolean.whatsapp_switch
      - lmargin: '-5px'
  - type: custom:decluttering-card
    template: scene_button
    variables:
      - name: Music
      - icon: mdi:music
      - entity: input_boolean.spoti_switch
      - lmargin: '-5px'
  - type: custom:decluttering-card
    template: scene_button
    variables:
      - name: Chill
      - icon: mdi:sofa-outline
      - entity: input_boolean.lounge_chill_switch
      - lmargin: '-5px'
  - type: conditional
    conditions:
      - condition: state
        entity: input_boolean.its_christmas
        state: 'on'
    card:
      - type: custom:decluttering-card
        template: scene_button
        variables:
          - name: Xmas
          - icon: mdi:pine-tree-variant-outline
          - entity: input_boolean.xmas_switch
          - lmargin: '-5px'
