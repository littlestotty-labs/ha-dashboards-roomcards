kiosk_mode:
  mobile_settings:
    hide_header: true
    ignore_entity_settings: true
  non_admin_settings:
    hide_header: true
    hide_menubutton: true
    ignore_entity_settings: true
  entity_settings:
    - entity:
        input_boolean.kiosk_mode: 'on'
      hide_header: true
    - entity:
        input_boolean.kiosk_mode: 'off'
      hide_header: false
decluttering_templates:
  light_row:
    card:
      type: custom:bubble-card
      card_type: button
      button_type: slider
      sub_button:
        main:
          - entity: '[[entity]]'
            name: percent
            scrolling_effect: false
            show_background: false
            light_background: false
            show_icon: false
            show_state: false
            show_attribute: true
            attribute: brightness
          - entity: '[[lock_entity]]'
            scrolling_effect: false
            show_icon: true
            show_background: true
            state_background: true
            use_accent_color: true
            show_state: false
            tap_action:
              action: toggle
            hide_when_parent_unavailable: true
            content_layout: icon-left
            name: lock
        bottom: []
      entity: '[[entity]]'
      name: '[[name]]'
      icon: '[[icon]]'
      scrolling_effect: false
      use_accent_color: false
      show_state: false
      show_attribute: false
      attribute: brightness
      min_value: 0
      max_value: 100
      step: 1
      slider_live_update: true
      allow_light_slider_to_0: true
      light_transition: true
      tap_action:
        action: none
      hold_action:
        action: more-info
      styles: |-
        .bubble-container {
          height: 50px !important;
          background-color: var(--card-background-color) !important;
          opacity: 1 !important;
          border-radius: var(--ha-card-border-radius) !important;
          box-shadow: var(--ha-card-box-shadow) !important;
        }
        * {
          --bubble-button-border-radius: 12px;
        }
        .bubble-range-fill {
          opacity: var(--bubble-light-opacity) !important;
          background-color: var(--accent-color) !important;
          right: 100 !important;
          left: 10 !important;
          transform-origin: left center !important;
        }
        ${
          (() => {
            const sub = card.querySelector('.lock');
            if (!sub) return;
            const entity = sub.getAttribute('data-entity');
            const state = hass.states[entity]?.state;
            sub.style.backgroundColor = state === 'on' ? 'green' : '';
          })()
        }

        ${
          (() => {
            const lock = card.querySelector('.lock');
            const fill = card.querySelector('.bubble-range-fill');
            if (!lock || !fill) return;

            const entity = lock.getAttribute('data-entity');
            const locked = hass.states[entity]?.state === 'on';

            fill.style.filter = locked ? 'saturate(0.3)' : '';
            fill.style.boxShadow = locked
                  ? 'inset 0 0 0px 1px rgba(0, 150, 0, 0.4)'
                  : '';
          })()
        }       

        ${
          (() => {
            const lock = card.querySelector('.lock');
            if (!lock) return;

            const entity = lock.getAttribute('data-entity');
            const locked = hass.states[entity]?.state === 'on';

            lock.style.opacity = locked ? '1' : '0.6';
            lock.style.transform = locked ? 'scale(1)' : 'scale(0.85)';
          })()
        }        
  scene_button:
    card:
      type: custom:button-card
      entity: '[[entity]]'
      name: '[[name]]'
      icon: '[[icon]]'
      styles:
        card:
          - margin-top: '-12px'
          - margin-bottom: '-12px'
          - margin-left: '-7px'
          - border-radius: var(--ha-card-border-radius)
        icon:
          - width: 80%
          - height: 80%
          - color: var(--primary-color)
        img_cell:
          - border-radius: 50%
          - width: 80%
          - height: 80%
        name:
          - font-size: 12px
          - font-weight: 500
          - color: var(--primary-color)
      state:
        - value: 'on'
          styles:
            icon:
              - color: var(--scene-selected-color)
            card:
              - background-color: var(--scene-active-background)
            name:
              - color: var(--scene-selected-color)
button_card_templates:
  room_card:
    variables:
      show_state: false
      show_label: false
      accent_color: blue
    name: '[[[ return variables.name]]]'
    icon: '[[[ return variables.icon]]]'
    label: '[[[ return variables.label]]]'
    tap_action:
      action: navigate
    styles:
      grid:
        - grid-template-areas: '"n btn" "l btn" "i btn"'
        - grid-template-columns: 1fr min-content
        - grid-template-rows: min-content min-content 1fr
      card:
        - height: 140px
        - padding: 10px 10px 15px 15px
      custom_fields:
        btn:
          - justify-content: end
          - align-self: start
      name:
        - justify-self: start
        - align-self: start
        - font-size: 16px
        - font-weight: 600
        - color: '[[[return variables.accent_color]]]'
      label:
        - min-height: 80px
        - text-align: left
        - justify-content: start
        - justify-self: start
        - align-self: start
        - font-size: 12px
        - font-weight: 700
        - color: '[[[return variables.accent_color]]]'
        - opacity: 0.6
        - word-break: break-word
        - white-space: normal
      img_cell:
        - justify-content: start
        - position: absolute
        - width: 105px
        - height: 105px
        - left: 0
        - bottom: 0
        - margin: 0 0 -20px -20px
        - background: >
            [[[ return "color-mix(in srgb, " + variables.accent_color + ",
            transparent 40%)"; ]]]
        - border-radius: 500px
      icon:
        - margin-left: 25px
        - width: 50px
        - color: >
            [[[ return "color-mix(in srgb, " + variables.accent_color + ", black
            70%)"; ]]]
        - opacity: '0.3'
    show_state: true
  sub_headings:
    variables:
      var_name: name
    name: '[[[ return variables.var_name]]]'
    styles:
      grid:
        - grid-template-areas: '"n"'
      card:
        - background: transparent
        - height: 40px
        - border-radius: 0px
        - margin-top: 20px
      name:
        - justify-self: start
        - font-size: 18px
        - font-weight: 500
        - color: var(--primary-text-color)
        - font-weight: bold
        - margin-bottom: '-15px'
    show_state: false
    show_name: true
    show_icon: false
  bubble_base:
    variables:
      show_state: false
    name: '[[[ return variables.name]]]'
    entity: '[[[ return variables.entity]]]'
    icon: '[[[ return variables.icon]]]'
    show_state: '[[[ return variables.show_state]]]'
    tap_action:
      action: toggle
    state:
      - value: 'off'
        styles:
          card:
            - background: var(--card-background-color)
          img_cell:
            - background: var(--grey1150)
          icon:
            - color: var(--primary-color)
          name:
            - color: var(--primary-color)
          state:
            - color: var(--primary-color)
      - value: 'on'
        styles:
          card:
            - background: var(--bubble-accent-color)
          img_cell:
            - background: var(--card-background-color)
          icon:
            - color: var(--bubble-accent-color)
          name:
            - color: var(--card-background-color)
    styles:
      card:
        - padding: 5px 0px 5px 6px
        - height: 50px
        - border-radius: var(--ha-card-border-radius)
      grid:
        - grid-template-areas: |
            "i n"
        - grid-template-columns: 33% 67%
      img_cell:
        - justify-self: start
        - align-self: start
        - padding: 9px
        - border-radius: 500%
        - width: 21px
        - height: 20px
      icon:
        - width: 70%
        - height: 70%
      name:
        - justify-self: start
        - text-align: left
        - font-size: 12px
        - font-weight: 600
        - color: var(--disabled-text-color)
  heat:
    styles:
      icon:
        - color: |
            [[[
              if (entity.state === 'on') return 'orange';
              return variables.accent_color;
            ]]]           
        - animation: |
            [[[
              if (entity.state !== 'on') return 'none';
              return 'heat-shimmer 2.5s ease-in-out infinite';
            ]]]   
    extra_styles: |
      @keyframes heat-shimmer {
        0% {
          transform: translate(0px, 0px) skewX(0deg);
        }
        25% {
          transform: translate(0.6px, -0.8px) skewX(2deg);
        }
        50% {
          transform: translate(-0.6px, -1.2px) skewX(-2deg);
        }
        75% {
          transform: translate(0.4px, -0.6px) skewX(0.6deg);
        }
        100% {
          transform: translate(0px, 0px) skewX(0deg);
        }
      }
  aircon:
    styles:
      icon:
        - animation: |
            [[[
              if (entity.state !== 'on') return 'none';
              return `rotating 6s linear infinite`;
            ]]]
    extra_styles: |
      @keyframes rotating {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
  fan:
    styles:
      icon:
        - animation: |
            [[[
              if (entity.state !== 'on') return 'none';

              const base = entity.entity_id.split('.')[1];
              const powerSensor = `sensor.${base}_power`;
              const s = states[powerSensor];

              let watts = s ? parseFloat(s.state) : NaN;
              if (isNaN(watts)) watts = 20;

              const duration = Math.min(7, Math.max(.2, 8 - watts * 0.23));
              return `rotating ${duration}s linear infinite`;
            ]]]
    extra_styles: |
      @keyframes rotating {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
  coffee:
    icon: |
      [[[
        if (entity.state !== 'on') return 'mdi:coffee-maker-outline';
        return 'mdi:coffee-maker';
      ]]]
    styles:
      icon:
        - animation: |
            [[[
              if (entity.state !== 'on') return 'none';
              return `java 4s linear infinite`;
            ]]]
    extra_styles: |
      @keyframes java {
        0%, 80%, 100% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 0 100%); }
        10% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 79%, 63% 76%, 67% 70%, 66% 54%, 42% 55%, 42% 70%, 47% 77%, 55% 80%, 57% 100%, 0 100%); }
        15% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 79%, 63% 76%, 67% 70%, 66% 54%, 42% 54%, 42% 70%, 47% 77%, 55% 80%, 55% 100%, 0 100%); }
        20% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 76%, 63% 76%, 67% 70%, 66% 54%, 42% 55%, 42% 70%, 47% 76%, 55% 76%, 57% 100%, 0 100%); }
        25% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 76%, 63% 76%, 67% 70%, 66% 54%, 42% 54%, 42% 70%, 47% 76%, 55% 76%, 56% 100%, 0 100%); }
        30% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 73%, 64% 73%, 66% 70%, 66% 55%, 42% 55%, 42% 69%, 44% 73%, 55% 73%, 57% 100%, 0 100%); }
        35% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 73%, 64% 73%, 66% 70%, 66% 55%, 42% 54%, 42% 69%, 44% 73%, 55% 73%, 56% 100%, 0 100%); }
        40% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 70%, 67% 70%, 66% 54%, 42% 54%, 42% 70%, 57% 70%, 57% 100%, 0 100%); }
        45% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 70%, 67% 70%, 66% 54%, 42% 54%, 42% 70%, 55% 70%, 56% 100%, 0 100%); }
        50% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 66%, 67% 65%, 66% 54%, 42% 54%, 42% 65%, 57% 65%, 57% 100%, 0 100%); }
        55% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 66%, 67% 65%, 66% 54%, 42% 54%, 42% 65%, 55% 65%, 56% 100%, 0 100%); }
        60% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 60%, 66% 60%, 66% 54%, 42% 54%, 42% 60%, 57% 60%, 57% 100%, 0 100%); }
        65% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 60%, 66% 60%, 66% 54%, 42% 54%, 42% 60%, 55% 60%, 56% 100%, 0 100%); }
        70% { clip-path: polygon(0 0, 100% 0, 100% 32%, 47% 32%, 47% 43%, 100% 43%, 100% 100%, 55% 100%, 55% 56%, 66% 56%, 66% 54%, 42% 54%, 42% 56%, 57% 56%, 57% 100%, 0 100%); }
        75% { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 55% 56%, 66% 56%, 66% 54%, 42% 54%, 42% 56%, 55% 56%, 55% 100%, 0 100%); }
      }
  bubble_lookalike:
    template: bubble_base
  bubble_aircon:
    template:
      - bubble_base
      - aircon
  bubble_heater:
    template:
      - bubble_base
      - heat
  bubble_coffee:
    template:
      - bubble_base
      - coffee
  bubble_fan:
    template:
      - bubble_base
      - fan
  room_button:
    tap_action:
      action: '[[[return variables.tap_action]]]'
      navigation_path: '[[navigation_path]]'
      service: light.turn_off
      target:
        entity_id: light.house_lights
    entity: '[[entity]]'
    icon: '[[[ return variables.icon]]]'
    show_name: false
    state:
      - value: 'on'
        styles:
          icon:
            - color: var(--selected-color)
            - opacity: 1
          card:
            - background-color: '[[[ return variables.accent_color]]]'
    styles:
      card:
        - padding: 2px
        - width: 44px
        - height: 35px
        - border-radius: var(--ha-card-border-radius)
        - background-color: var(--selected-color)
      icon:
        - width: 30px
        - color: >
            [[[ return "color-mix(in srgb, " + variables.accent_color + ",
            transparent 40%)"; ]]]
        - opacity: 0.8
  fan_room_button:
    template:
      - room_button
      - fan
  heater_room_button:
    template:
      - room_button
      - heat
  aircon_room_button:
    template:
      - room_button
      - aircon
  coffee_room_button:
    template:
      - room_button
      - coffee
  inkwell:
    show_name: false
    show_state: true
    extra_styles: |
      [[[ return `
        @keyframes pulse {
          0% {
            background-color: ${variables.color};
          }
          50% {
            background-color: transparent;
          }
          100% {
            background-color: ${variables.color};
          }
        }
      `]]]
    styles:
      icon:
        - opacity: 0.7
        - color: '[[[ return variables.color ]]]'
      state:
        - font-size: 0.7em
        - font-weight: normal
        - color: |
            [[[
             var color = variables.color;
             if (color == 'black') return 'white';
             if (color == 'yellow') return 'black';
             else return 'var(--grey800)';
             ]]]
      card:
        - border: solid 1px VAR(--grey600)
        - border-radius: 6px 6px 15px 15px
        - background: |
            [[[
              var level = entity.state;
              var color = variables.color;
              var ink_color = 'black'; // Added quotes and fixed semicolon

              if (color == 'magenta') ink_color = 'rgba(255,0,255,0.7)'; // Added quotes
              if (color == 'cyan') ink_color = 'rgba(0,255,255,0.7)'; // Fixed rbga typo
              if (color == 'yellow') ink_color = 'rgba(255,255,0,0.7)'; // Fixed rbga typo
              if (color == 'black') ink_color = 'rgba(0,0,0,0.7)'; // Fixed rbga typo

              return `linear-gradient(to top, ${ink_color}, ${ink_color} ${level}%, rgba(255,255,255,0.12) ${level}%)`;
            ]]]
        - animation: |
            [[[
              return (0 + entity.state) < 10
                ? 'pulse 3s ease-in-out infinite'
                : 'none'
            ]]]
title: Collt
views:
  - title: Home
    path: home
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            tap_action:
              action: call-service
              service: |
                [[[
                  this.dispatchEvent(new Event('hass-toggle-menu', { bubbles: true, composed: true}));
                  return none;
                ]]]
            hold_action:
              action: url
              url_path: null
            icon: mdi:menu
            color: var(--primary-color)
            show_name: false
            styles:
              card:
                - margin: 10px 0px -5px 3px
                - width: 33px
                - height: 35px
                - border-radius: var(--ha-card-border-radius)
                - box-shadow: none
                - background-color: transparent
                - background: transparent
              icon:
                - width: 90%
          - type: custom:gap-card
            styles: null
            card:
              - margin: 0px 0px -5px 0px
              - width: 3px
          - type: custom:button-card
            entity: weather.ryde
            tap_action:
              action: navigate
              navigation_path: '#weather'
            icon: ''
            label: |
              [[[
                var state1 = states['sensor.ryde_temp'].state;
                var state2 = states['weather.ryde'].state;

                // Replace hyphens with spaces and convert to title case
                state2 = state2.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

                return "Ryde: " + state1 + " °C<br/>" + state2;
              ]]]
            show_icon: false
            show_name: false
            show_label: true
            styles:
              grid:
                - grid-template-areas: |
                    "i l" "i l"
                - grid-template-columns: 27% 73%
                - grid-template-rows: 1fr
              label:
                - font-size: 0.60em
                - font-weight: 500
                - color: var(--primary-color)
                - text-align: left
                - justify-sef: start
              card:
                - margin: 10px 0px -5px 3px
                - height: 36px
                - width: 115px
                - background: var(--card-background-color)
                - background-image: |
                    [[[ 
                      var images = states["weather.ryde"].state; 
                      return 'url(/local/ic/weather_icons/animated2/'+images+'.svg)'
                    ]]]        
                - background-repeat: no-repeat
                - background-size: 32%
                - background-position-x: 4px
                - background-position-y: center
                - background-origin: border-box
          - type: custom:button-card
            entity: sensor.temp_sensor_temperature
            icon: mdi:thermometer
            show_icon: true
            label: |
              [[[
                var state1 = states['sensor.temp_sensor_temperature'].state;
                return "Indoor <br/> " + state1 + " °C ";
              ]]]
            show_name: false
            show_label: true
            styles:
              card:
                - margin: 10px -3px -5px 0px !important;
                - height: 36px
                - width: 82px
              grid:
                - grid-template-areas: |
                    "i l" "i l"
                - grid-template-columns: 35% 65%
              label:
                - font-size: 0.60em
                - font-weight: 500
                - color: var(--primary-color)
                - text-align: left
                - justify-self: start
              icon:
                - height: 100%
                - width: 65%
                - color: |
                    [[[
                      const t = parseFloat(states['sensor.temp_sensor_temperature']?.state);
                      if (isNaN(t)) return '#4D8DF7';

                      const ease = x => Math.pow(Math.min(Math.max(x, 0), 1), 0.8);

                      const blend = (c1, c2, x) => {
                        const r1 = parseInt(c1.substr(1,2), 16);
                        const g1 = parseInt(c1.substr(3,2), 16);
                        const b1 = parseInt(c1.substr(5,2), 16);
                        const r2 = parseInt(c2.substr(1,2), 16);
                        const g2 = parseInt(c2.substr(3,2), 16);
                        const b2 = parseInt(c2.substr(5,2), 16);

                        const k = ease(x);

                        const r = Math.round(r1 + (r2 - r1) * k);
                        const g = Math.round(g1 + (g2 - g1) * k);
                        const b = Math.round(b1 + (b2 - b1) * k);

                        return `rgb(${r}, ${g}, ${b})`;
                      };

                      if (t < 10) {
                        return '#4D8DF7';

                      } else if (t < 17) {
                        return blend('#4D8DF7', '#68DA6A', (t - 10) / 7);

                      } else if (t < 23) {
                        return blend('#68DA6A', '#CAFA4F', (t - 17) / 6);

                      } else if (t < 26) {
                        return blend('#CAFA4F', '#E4BE49', (t - 23) / 3);

                      } else if (t < 30) {
                        return blend('#E4BE49', '#EA4237', (t - 26) / 4);

                      } else {
                        return '#EA4237';
                      }
                    ]]]
          - type: custom:button-card
            entity: sensor.temp_sensor_humidity
            icon: mdi:water-percent
            show_icon: true
            label: |
              [[[
                const h = states['sensor.temp_sensor_humidity']?.state;
                return `Humidity<br/>${h} %`;
              ]]]
            show_name: false
            show_label: true
            styles:
              grid:
                - grid-template-areas: |
                    "i l" "i l"
                - grid-template-columns: 35% 65%
              label:
                - font-size: 0.60em
                - font-weight: 500
                - color: var(--primary-color)
                - text-align: left
                - justify-self: start
              card:
                - margin: 10px 9px -5px 0px !important;
                - height: 36px
                - width: 80px
              icon:
                - height: 100%
                - width: 65%
                - color: |
                    [[[
                      const h = parseFloat(states['sensor.temp_sensor_humidity']?.state);
                      if (isNaN(h)) return '#27c45e';

                      // Same perceptual easing used in your temperature icon
                      const ease = x => Math.pow(Math.min(Math.max(x, 0), 1), 0.8);

                      const blend = (c1, c2, x) => {
                        const r1 = parseInt(c1.substr(1, 2), 16);
                        const g1 = parseInt(c1.substr(3, 2), 16);
                        const b1 = parseInt(c1.substr(5, 2), 16);
                        const r2 = parseInt(c2.substr(1, 2), 16);
                        const g2 = parseInt(c2.substr(3, 2), 16);
                        const b2 = parseInt(c2.substr(5, 2), 16);

                        const k = ease(x);

                        const r = Math.round(r1 + (r2 - r1) * k);
                        const g = Math.round(g1 + (g2 - g1) * k);
                        const b = Math.round(b1 + (b2 - b1) * k);

                        return `rgb(${r}, ${g}, ${b})`;
                      };

                      if (h < 10) {
                        return blend('#ef4a46', '#f8a44b', h / 10);

                      } else if (h < 35) {
                        return blend('#f8a44b', '#27c45e', (h - 10) / 25);

                      } else if (h < 65) {
                        return blend('#27c45e', '#f8a44b', (h - 35) / 30);

                      } else if (h < 80) {
                        return blend('#f8a44b', '#ef4a46', (h - 65) / 20);

                      } else {
                        return '#ef4a46';
                      }
                    ]]]
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          xmas-grid-template-columns: 17% 17% 17% 17% 17% 17%
          grid-template-columns: 20.8% 20.8% 20.8% 20.8% 20.8%
        cards:
          - type: custom:decluttering-card
            template: scene_button
            variables:
              - name: Movie
              - icon: mdi:movie-open-check
              - entity: input_boolean.movie_switch
              - lmargin: '-5px'
          - type: custom:decluttering-card
