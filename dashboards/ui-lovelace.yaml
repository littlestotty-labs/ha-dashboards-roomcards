# -----------------------------------------------------------
# ui-lovelace.yaml
# Main dashboard — single-page room-centric layout with
# Bubble Card pop-ups (inline), room grid, and scene bar.
# Author: Graham Stott (littlestotty-labs)
# Version: 1.0
# -----------------------------------------------------------

kiosk_mode: !include includes/kiosk.yaml

decluttering_templates: !include includes/decluttering.yaml

button_card_templates: !include_dir_merge_named button_templates/

title: MyDashboard
views:
  - title: Home
    path: home
    cards:
      - !include home_cards/banner.yaml
      - !include home_cards/scenes.yaml
      - type: vertical-stack
        cards:
          - square: false
            type: grid
            cards:
              - !include home_cards/lounge.yaml
              - !include home_cards/bedroom.yaml
              - !include home_cards/office.yaml
              - !include home_cards/lights.yaml
              - !include home_cards/garden.yaml

              - type: vertical-stack
                cards:
                  - !include home_cards/kitchen.yaml
                  - !include home_cards/tech.yaml
            columns: 2
      - !include home_cards/petrol.yaml


      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: Lounge
            icon: mdi:sofa
            hash: '#room_lounge'
            is_sidebar_hidden: true
            margin_top_mobile: '-30px'
            margin_top_desktop: '-30px'
            button_type: name
            show_header: true
            styles: |
              .bubble-pop-up-background {
                background: var(--popup-header-background) !important;
              }
              .bubble-button-background {
                background: var(--popup-header-background) !important; 
              } 
              .bubble-close-icon {
                  color: var(--room-lounge);
                --mdc-icon-size: 40px !important;
              }       
              .bubble-header {
                  color: var(--room-lounge) !important;
              }      
            sub_button:
              main: []
              bottom: []
            slider_fill_orientation: left
            slider_value_position: right
          - type: custom:gap-card
            height: 40px
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.lounge_light
              - name: Lounge Light
              - icon: mdi:sofa-outline
              - lock_entity: input_boolean.loungelightlock_switch
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: bubble_fan
                entity: switch.plug_pink_2
                name: Pedestal Fan
                icon: mdi:fan
              - type: custom:button-card
                template: bubble_lookalike
                entity: switch.plug_purple_2
                name: Heater
                icon: mdi:heat-wave
          - type: custom:gap-card
            height: 40px
          - type: custom:vertical-stack-in-card
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.shield_source
                    state: Netflix
                card:
                  type: custom:mini-media-player
                  entity: media_player.android_tv_10_0_0_26
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.shield_source
                    state_not: Netflix
                card:
                  type: custom:mini-media-player
                  entity: media_player.emby_shield
                  volume_stateless: true
                  toggle_power: true
                  group: false
                  artwork: full-cover
                  source: full
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: Bedroom
            icon: mdi:bed-outline
            hash: '#room_bedroom'
            is_sidebar_hidden: true
            margin_top_mobile: '-30px'
            margin_top_desktop: '-30px'
            button_type: name
            show_header: true
            styles: |
              .bubble-pop-up-background {
                background: var(--popup-header-background) !important;
              }
              .bubble-button-background {
                background: var(--popup-header-background) !important; 
              } 
              .bubble-close-icon {
                  color: var(--room-bedroom);
                --mdc-icon-size: 40px !important;
              }       
              .bubble-header {
                  color: var(--room-bedroom) !important;
              }      
          - type: custom:gap-card
            height: 40px
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: bubble_fan
                entity: switch.plug_blue
                name: Pedestal Fan
                icon: mdi:fan
              - type: custom:bubble-card
                card_type: empty-column
          - type: custom:bubble-card
            card_type: separator
            name: Air Purifier
            rows: 1
            styles: >-
              ha-card {
                margin-top: 15px;
                margin-bottom: -10px !important;
              }

              .bubble-sub-button-1 { color:
              var(--popup-secondary-text);;background:
              var(--popup-card-background);}

              .separator-container { color: var(--room-bedroom);}

              .bubble-line { background: var(--room-bedroom); height: 2px }

              .bubble-name { 
                 color: var(--popup-secondary-text) !important; 
                font-size:14px !important;
              }
          - type: horizontal-stack
            cards:
              - type: custom:bubble-card
                card_type: climate
                name: Purifier
                entity: fan.core_300s
                show_state: false
                show_name: false
                card_layout: large-2-rows
                icon: mdi:air-purifier
                sub_button:
                  - name: Mode
                    select_attribute: preset_modes
                    show_arrow: false
                    state_background: false
                    show_name: false
                  - name: PM2
                    entity: sensor.core_300s_pm2_5
                    show_icon: false
                    show_background: false
                    show_state: true
                    show_name: true
                  - name: AQ
                    entity: sensor.core_300s_air_quality
                    show_icon: false
                    show_background: false
                    show_state: true
                    show_name: true
                  - name: Filter
                    entity: sensor.core_300s_filter_lifetime
                    show_icon: false
                    show_background: false
                    show_state: true
                    show_name: true
                styles: |
                  .bubble-container {
                    height: 50px !important;
                    background-color: var(--card-background-color) !important;
                    opacity: 1 !important;
                    border-radius: var(--ha-card-border-radius) !important;
                    box-shadow: var(--ha-card-box-shadow) !important;
                  }
              - type: custom:button-card
                entity: input_boolean.purifier_vacuum
                section_mode: null
                show_name: false
                icon: |
                  [[[
                      if (entity.state == 'on') return 'mdi:vacuum';
                      else return 'mdi:vacuum-outline';
                  ]]]
                styles:
                  card:
                    - width: 50px
                    - height: 50px
                    - border-radius: 50%
                    - background: |
                        [[[
                          if (entity.state == 'on') return 'red';
                          else return 'var(--card-background-color)';
                        ]]]
                  icon:
                    - width: 60%
                    - height: 60%
                    - color: |
                        [[[ if (entity.state === "on")
                             return 'var(--ha-card-background)';
                            else
                             return 'var(--accent-color)';
                         ]]]
          - type: custom:bubble-card
            card_type: separator
            name: Air Conditioner
            rows: 1
            styles: >-
              ha-card {
                margin-top: 15px;
                margin-bottom: -10px !important;
              }

              .bubble-sub-button-1 { color:
              var(--popup-secondary-text);;background:
              var(--popup-card-background);}

              .separator-container { color: var(--room-bedroom);}

              .bubble-line { background: var(--room-bedroom); height: 2px }

              .bubble-name { font-size:14px !important;}
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: bubble_aircon
                entity: input_boolean.cool_room
                name: Aircon Cool
                icon: mdi:snowflake
              - type: custom:button-card
                template: bubble_heater
                entity: input_boolean.heat_room
                name: Aircon Warm
                icon: mdi:radiator
          - type: custom:bubble-card
            card_type: climate
            name: Aircon
            entity: climate.aircon
            show_state: true
            state-background: true
            card_layout: normal
            state-color: true
            sub_button:
              - name: HVAC modes menu
                select_attribute: hvac_modes
                show_arrow: true
                state_background: true
            styles: |
              .bubble-container {
                height: 50px !important;
                background-color: var(--card-background-color) !important;
                opacity: 1 !important;
                border-radius: 25px !important;
                box-shadow: var(--ha-card-box-shadow) !important;
              }
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: Office
            icon: mdi:desk
            hash: '#room_office'
            is_sidebar_hidden: true
            margin_top_mobile: '-30px'
            margin_top_desktop: '-30px'
            button_type: name
            show_header: true
            styles: |
              .bubble-pop-up-background {
                background: var(--popup-header-background) !important;
              }
              .bubble-button-background {
                background: var(--popup-header-background) !important; 
              } 
              .bubble-close-icon {
                --mdc-icon-size: 40px !important;
                  color: var(--room-office);
              }       
              .bubble-header {
                  color: var(--room-office) !important;
              }      
            sub_button:
              main: []
              bottom: []
          - type: custom:gap-card
            height: 40px
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.hue_filament_bulb_1
              - name: Office Light
              - icon: mdi:chair-rolling
              - lock_entity: input_boolean.officelightlock_switch
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: bubble_lookalike
                entity: switch.office_wall_l
                name: Desk Wall (L)
                icon: mdi:power-plug-outline
              - type: custom:button-card
                template: bubble_lookalike
                entity: switch.office_wall_r
                name: Desk Wall (R)
                icon: mdi:power-plug-outline
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: bubble_lookalike
                entity: switch.plug_orange
                name: Fridge and<br/>Coffee
                icon: mdi:coffee-maker
              - type: custom:button-card
                template: bubble_lookalike
                entity: input_boolean.wfh_today
                name: Working From<br/>Home
                icon: mdi:chair-rolling
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: bubble_fan
                entity: switch.plug_yellow
                name: Pedestal Fan
                icon: mdi:fan
              - type: custom:button-card
                template: bubble_lookalike
                entity: switch.plug_purple_2
                name: Heater
                icon: mdi:heat-wave
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: House Lights
            icon: mdi:lightbulb-group
            hash: '#room_lights'
            is_sidebar_hidden: true
            margin_top_mobile: '-30px'
            margin_top_desktop: '-30px'
            button_type: name
            show_header: true
            styles: |
              .bubble-pop-up-background {
                background: var(--popup-header-background) !important;
              }
              .bubble-button-background {
                background: var(--popup-header-background) !important; 
              } 
              .bubble-close-icon {
                --mdc-icon-size: 40px !important;
                  color: var(--room-lights);
              }       
              .bubble-header {
                  color: var(--room-lights) !important;
              }      
          - type: custom:gap-card
            height: 40px
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.lounge_light
              - name: Lounge Light
              - icon: mdi:sofa-outline
              - lock_entity: input_boolean.loungelightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.downstairs_hallway
              - name: Foyer
              - icon: phu:rooms-front-door
              - lock_entity: input_boolean.foyerlightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.laundry_light
              - name: Laundry
              - icon: mdi:washing-machine
              - lock_entity: input_boolean.laundrylightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.loo_light
              - name: Downstairs Loo
              - icon: phu:yeelight-ceiling
              - lock_entity: input_boolean.loolightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.staircase
              - name: Stairs
              - icon: mdi:stairs
              - lock_entity: input_boolean.stairslightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.hue_ambiance_lamp_1_2
              - name: Landing
              - icon: mdi:stairs
              - lock_entity: input_boolean.landinglightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.hue_filament_bulb_1
              - name: Office
              - icon: phu:rooms-office
              - lock_entity: input_boolean.officelightlock_switch
          - type: custom:decluttering-card
            template: light_row
            variables:
              - entity: light.outside_front
              - name: Front Garden
              - icon: phu:stage-spot-light
              - lock_entity: input_boolean.outdoorlightlock_switch
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            name: Weather
            icon: mdi:sun
            hash: '#weather'
            is_sidebar_hidden: true
            margin_top_mobile: '-30px'
            margin_top_desktop: '-30px'
            button_type: name
            show_header: true
            show_name: false
            show_icon: false
            styles: |
              .bubble-pop-up-background {
                background: var(--popup-header-background) !important;
              }
              .bubble-button-background {
                background: var(--popup-header-background) !important; 
              } 
              .bubble-close-icon {
                --mdc-icon-size: 40px !important;
                  color: var(--room-lights);
              }       
              .bubble-header {
                  color: var(--room-lights) !important;
              }      
          - type: custom:gap-card
            height: 40px
          - type: custom:button-card
            entity: weather.ryde_weather
            show_state: true
            show_name: false
            show_icon: false
            show_label: true
            tap_action:
              action: more-info
            custom_fields:
              icon:
                card:
                  type: custom:button-card
                  show_name: false
                  show_state: false
                  show_entity_picture: true
                  entity_picture: |
                    [[[ 
                      var images = states["weather.ryde"].state; 
                      return '/local/ic/weather_icons/animated2/'+images+'.svg'
                    ]]]
                  styles:
                    card:
                      - margin: 0px
                        padding: 0px
                        box-shadow: 0 0 0 0;
                        border: none
                        background-color: var(--grey400)
                        width: 170px
                        height: 100px
                        margin-right: '-30px'
                        margin-top: 10px
                    img_cell:
                      - padding: 0px
                        margin: 0px
                        height: 100px
                        width: 200px
                        background-color: transparent;
            label: |
              [[[ 
                return 'Ryde <br/>' + states['sensor.ryde_temp'].state + '°';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"l icon" "s icon"'
                  grid-template-rows: auto auto
                  justify-items: start
                  align-items: start
              card:
                - padding: 0px
                  margin: 0px
                  background-color: transparent
                  border-radius: 0px
                  box-shadow: none
                  border: none
              label:
                - font-size: 50px
                  font-weight: 600
                  color: var(--primary-color)
                  justify-self: start
                  align-self: start
                  padding: 0px
                  margin: 0px
              state:
                - font-size: 20px
                  font-weight: 600
                  color: var(--primary-color)
                  justify-self: start
                  align-self: start
                  padding: 0px
                  margin: 0px
              custom_fields:
                icon:
                  - height: 60px;;
                  - justify-self: end;
                  - align-self: start;
                  - padding-right: 17px
                  - padding-top: 10px
          - type: markdown
            content: |-
              Feels like {{ states('sensor.ryde_temp_feels_like') }}°
              {{ states('sensor.ryde_extended_text_0') }}
            card_mod:
              style: |
                ha-card {
                border: none
                color: var(--grey300) !important;
                background-color: transparent;
                margin: 0px -15px 0px -15px;
                box-shadow: none;
                font-size: 16px;
                }
          - type: custom:button-card
            styles:
              grid:
                - grid-template-areas: '"chips" "chips"'
              card:
                - background: rgba(0, 0, 0, 0)
                  box-shadow: none;
                  flex-direction: row
                  overflow-x: auto
                  flex-wrap: nowrap
                  flex-shrink: 0
                  scrollbar-width: thin
                  scrollbar-color: rgba(255,255,255, 0.05) rgba(255,255,255, 0)
                  padding: 2
                  margin-top: '-10px'
                  border: none
            custom_fields:
              chips:
                card:
                  type: horizontal-stack
                  cards:
                    - type: custom:button-card
                      name: |
                        [[[ 
                          return states['sensor.ryde_humidity'].state + '%';
                        ]]]
                      entity: sensor.ryde_humidity
                      icon: mdi:water
                      show_state: false
                      show_name: true
                      show_icon: true
                      tap_action:
                        action: more-info
                      styles:
                        grid:
                          - grid-template-areas: '"i n"'
                          - grid-template-columns: min-content min-content;
                        card:
                          - justify-self: center
                          - justify-content: center
                          - align-self: start
                          - border-radius: 50px
                          - width: auto
                          - height: 35px
                          - padding-right: 8px
                        name:
                          - justify-self: center
                            font-size: 12px
                            font-weight: 600
                            color: var(--primary-text-color)
                        img_cell:
                          - width: 30px
                          - background: transparent
                          - border-radius: 100%
                          - justify-content: center
                          - padding-left: 2px
                        icon:
                          - width: 20px
                          - padding-left: 2px
                          - color: var(--label-badge-green)
                    - type: custom:button-card
                      name: |
                        [[[ 
                          return states['sensor.ryde_rain_since_9am'].state + 'mm';
                        ]]]
                      entity: sensor.ryde_rain_since_9am
                      icon: mdi:weather-rainy
                      show_state: false
                      show_name: true
                      show_icon: true
                      tap_action:
                        action: more-info
                      styles:
                        grid:
                          - grid-template-areas: '"i n"'
                          - grid-template-columns: min-content min-content;
                        card:
                          - justify-self: center
                          - justify-content: center
                          - align-self: start
                          - border-radius: 50px
                          - width: auto
                          - height: 35px
                          - padding-right: 8px
                        name:
                          - justify-self: center
                            font-size: 12px
                            font-weight: 600
                            color: var(--primary-text-color)
                        img_cell:
                          - width: 30px
                          - background: transparent
                          - border-radius: 100%
                          - justify-content: center
                          - padding-left: 2px
                        icon:
                          - width: 20px
                          - padding-left: 2px
                          - color: var(--label-badge-blue)
                    - type: custom:button-card
                      name: |
                        [[[
                          var wind_speed = states['sensor.ryde_wind_speed_kilometre'].state + ' km/hr';
                          var wind_direction_state = states['sensor.ryde_wind_direction'].state;
                          return wind_speed + ', ' + wind_direction_state;
                        ]]]
                      entity: sensor.ryde_wind_speed_kilometre
                      icon: mdi:weather-windy
                      show_state: false
                      show_name: true
                      show_icon: true
                      tap_action:
                        action: more-info
                      styles:
                        grid:
                          - grid-template-areas: '"i n"'
                          - grid-template-columns: min-content min-content;
                        card:
                          - justify-self: center
                          - justify-content: center
                          - align-self: start
                          - border-radius: 50px
                          - width: auto
                          - height: 35px
                          - padding-right: 8px
                        name:
                          - justify-self: center
                            font-size: 12px
                            font-weight: 600
                            color: var(--primary-text-color)
                        img_cell:
                          - width: 30px
                          - background: transparent
                          - border-radius: 100%
                          - justify-content: center
                          - padding-left: 2px
                        icon:
                          - width: 20px
                          - color: grey
                          - padding-left: 2px
                    - type: custom:button-card
                      name: |
                        [[[ 
                          return states['sensor.ryde_max_temp'].state + '° High';
                        ]]]
                      entity: sensor.ryde_max_temp
                      icon: mdi:thermometer-chevron-up
                      show_state: false
                      show_name: true
                      show_icon: true
                      tap_action:
                        action: more-info
                      styles:
                        grid:
                          - grid-template-areas: '"i n"'
                          - grid-template-columns: min-content min-content;
                        card:
                          - justify-self: center
                          - justify-content: center
                          - align-self: start
                          - border-radius: 50px
                          - width: auto
                          - height: 35px
                          - padding-right: 8px
                        name:
                          - justify-self: center
                            font-size: 12px
                            font-weight: 600
                            color: var(--primary-text-color)
                        img_cell:
                          - width: 30px
                          - background: transparent
                          - border-radius: 100%
                          - justify-content: center
                          - padding-left: 2px
                        icon:
                          - width: 20px
                          - padding-left: 2px
                          - color: var(--label-badge-red)
                    - type: custom:button-card
                      name: |
                        [[[ 
                          return states['sensor.ryde_min_temp'].state + '° Low';
                        ]]]
                      entity: sensor.ryde_min_temp
                      icon: mdi:thermometer-chevron-down
                      show_state: false
                      show_name: true
                      show_icon: true
                      tap_action:
                        action: more-info
                      styles:
                        grid:
                          - grid-template-areas: '"i n"'
                          - grid-template-columns: min-content min-content;
                        card:
                          - justify-self: center
                          - justify-content: center
                          - align-self: start
                          - border-radius: 50px
                          - width: auto
                          - height: 35px
                          - padding-right: 8px
                        name:
                          - justify-self: center
                            font-size: 12px
                            font-weight: 600
                            color: var(--primary-text-color)
                        img_cell:
                          - width: 30px
                          - background: transparent
                          - border-radius: 100%
                          - justify-content: center
                          - padding-left: 2px
                        icon:
                          - width: 20px
                          - padding-left: 2px
                          - color: var(--label-badge-blue)
          - type: custom:swipe-card
            card_width: 100%
            card_height: 110%
            start_card: 1
            parameters:
              grabCursor: true
              centeredSlides: false
              slidesPerView: 1.2
              spaceBetween: 15
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:button-card
                    template: sub_headings
                    variables:
                      var_name: |
                        [[[ 
                          const currentHour = new Date().getHours();

                          if (currentHour < 12) {
                            return "Today";
                          } else if (currentHour < 18) {
                            return "Today";
                          } else {
                            return "This evening";
                          }
                        ]]]
                    styles:
                      card:
                        - border: none
                        - box-shadow: none
                        - background-colour: var(--gray600)
                        - margin-top: 0px
                  - type: custom:button-card
                    entity: weather.ryde_hourly
                    show_name: false
                    show_icon: false
                    show_label: false
                    show_state: false
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - padding: 20px
                        - margin: 0px
                      grid:
                        - grid-template-areas: '"icon low high" "div div div" "desc desc desc"'
                        - grid-template-columns: 35% auto auto
                        - grid-template-rows: auto auto auto
                      custom_fields:
                        icon:
                          - align-self: start
                          - justify-self: start
                        low:
                          - align-self: start
                          - justify-self: start
                          - margin-left: 5px
                        high:
